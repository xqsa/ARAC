project: ARAC
experiment_id: exp_002_aob_1run_pilot
benchmark: AOB

current_pilot:
  runs: 1
  seeds: [1]
  purpose: first-look utility signal only

final_protocol:
  final_target_runs: 25
  activate_after: pilot signal and gates justify full evaluation

budget:
  total_fe: 3000000
  count_phase_i_and_phase_ii_together: true
  decomposition_fe_counted: false

problems:
  - E1
  - E2
  - E3
  - E4
  - E5
  - E6
  - S1
  - S2
  - S3
  - S4
  - S5
  - S6
  - R1
  - R2
  - R3
  - R4
  - R5
  - R6
  - A1
  - A2
  - A3
  - A4
  - A5
  - A6

aob:
  dimension: 1000
  search_range: [-100, 100]
  base_functions:
    E: elliptic
    S: schwefel
    R: rastrigin
    A: ackley
  overlap_gamma_by_id:
    1: 0
    2: 1
    3: 3
    4: 5
    5: 7
    6: 10

comparison:
  paper_reported_baselines_csv: references/paper_reported_table2_hcc_es.csv
  baseline_role: paper_reported_evaluation_only
  rerun_baselines: false

runtime_boundary:
  reference_blind: true
  paper_reported_values_runtime_allowed: false
  oracle_action_eval_only_runtime_allowed: false
  forbidden_runtime_fields:
    - final_error
    - relative_gain
    - oracle
    - user_reference_best
    - reported_baseline
    - problem_family_label
    - prior_final_outcome
    - prior_pilot_outcome
